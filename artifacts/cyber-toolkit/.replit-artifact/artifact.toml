kind = "web"
previewPath = "/"
title = "Cybersecurity Toolkit"
version = "1.0.0"
id = "artifacts/cyber-toolkit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22696

[services.development]
run = "pnpm --filter @workspace/cyber-toolkit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-toolkit", "run", "build" ]
publicDir = "artifacts/cyber-toolkit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22696"
BASE_PATH = "/"
